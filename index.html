<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Recolector de Señas</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body style="text-align: center; font-family: sans-serif;">

    <h2>Grabar Nueva Seña</h2>
    
    <input type="text" id="nombreSena" placeholder="Ej: Hola, Gracias..." style="padding: 10px; margin-bottom: 10px;">
    <br>
    <button id="btnGrabar" style="padding: 15px 30px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; font-size: 16px;">Iniciar Grabación (30 frames)</button>
    <p id="estado">Esperando...</p>

    <video id="videoWebcam" style="display: none;" autoplay playsinline></video>
    <canvas id="canvasSalida" width="640" height="480" style="border: 2px solid #ccc; max-width: 100%;"></canvas>

    <script src="app.js"></script>
</body>
</html>
